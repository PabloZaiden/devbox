name: Binary Release

on:
  release:
    types: [published]

jobs:
  binaries:
    uses: pablozaiden/installer/.github/workflows/reusable-binary-release.yml@d65a93c1af0d7ce62524d6ccdfee44d0f6ceac4e # installer v0.0.7
    permissions:
      contents: write
    with:
      install_command: bun install --frozen-lockfile
      prebuild_command: bun run validate:release-version && bun run typecheck && bun run test:fast
      binaries: |
        [
          {
            "name": "devbox",
            "asset_prefix": "devbox",
            "build_command": "bun build --compile --target=$BUN_TARGET --outfile dist/devbox-$RELEASE_TARGET src/cli.ts",
            "output_path": "dist/devbox-$RELEASE_TARGET"
          }
        ]
