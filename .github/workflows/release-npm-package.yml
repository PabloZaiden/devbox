name: Release NPM Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v1.2.3)
        required: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Determine release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Error: release tag is empty"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install Bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from release tag
        run: npm pkg set version="${{ steps.release.outputs.version }}"

      - name: Verify package version
        run: |
          EXPECTED_VERSION="${{ steps.release.outputs.version }}"
          ACTUAL_VERSION="$(node -p "require('./package.json').version")"
          if [ "$EXPECTED_VERSION" != "$ACTUAL_VERSION" ]; then
            echo "Error: package version mismatch. Expected $EXPECTED_VERSION, got $ACTUAL_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fast tests
        run: bun run test:fast

      - name: Build package
        run: bun run build

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish --tag unstable --provenance --access public
          else
            npm publish --provenance --access public
          fi
